<!doctype html>
<html>
    <head>
        <title>2048 game</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <link rel="icon" type="image/png" sizes="128x128" href="images/icon128.png" />
        <link rel="apple-touch-icon" href="images/icon128.png" />

        <script type="module" src="/source/main.ts"></script>

        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <div id="Canvas"></div>

        <div id="GameStats">
            <span>Time: <strong id="roundTimer">0</strong></span>
            <span>Best: <strong id="bestVictoryTime">-</strong></span>
            <button type="button" id="restartButton">Restart</button>
        </div>

        <div id="GameMenu">
            <div class="sliderContainer">
                <span>Grid length</span>
                <input type="range" id="gridLength" min="4" max="10" step="1" />
                <span id="gridLengthLabel"></span>
            </div>

            <div class="sliderContainer">
                <span>Spawn range</span>
                <div class="dualRange">
                    <div class="dualRange-track"></div>
                    <div class="dualRange-fill" id="spawnRangeFill"></div>
                    <input type="range" id="spawnRangeMin" min="0" max="4" step="1" />
                    <input type="range" id="spawnRangeMax" min="0" max="4" step="1" />
                </div>
                <span id="spawnRangeLabel"></span>
            </div>
        </div>
    </body>
</html>
